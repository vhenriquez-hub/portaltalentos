    <div class="d-flex justify-content-center">
        <h1>Contacto</h1>
    </div>
        <div class="container p-5 my-5 border">
      <div class="row align-items-center">
        <div class="col-md-8 mb-4">
          <h2>Ubicacion</h2>
          <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d5976.971787238034!2d-72.99195600333859!3d-41.49374417228824!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x96183bf477995c3b%3A0xa59e7b27d02b1c2d!2sUniversidad%20de%20Los%20Lagos%20Puerto%20Montt!5e0!3m2!1ses-419!2scl!4v1777576944415!5m2!1ses-419!2scl" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>

        <div class="col-md-4">
          <!--<p>Información de contacto</p>-->
          <form>
           <div class="form-group">
              <label for="nombre">Nombre</label>
              <input type="text" class="form-control" id="nombre"  placeholder="Escribe tu nombre">
              <small id="emailHelp" class="form-text text-muted"></small>
            </div>
            <div class="form-group">
              <label for="apellido">Apellido</label>
              <input type="text" class="form-control" id="apellido"  placeholder="Escribe tu apellido">
              <small id="emailHelp" class="form-text text-muted"></small>
            </div>
            <div class="form-group">
              <label for="email">Correo</label>
              <input type="email" class="form-control" id="email"  placeholder="Escribe tu email">
              <small id="emailHelp" class="form-text text-muted"></small>
            </div>
            <div class="form-group">
              <label for="telefono">Telefono</label>
              <input type="text" class="form-control" id="telefono"  placeholder="Escribe tu telefono">
              <small id="emailHelp" class="form-text text-muted"></small>
            </div>
            
            <div class="form-group" >
              <label for="exampleFormControlSelect1">Campus</label>
              <select class="form-control" id="campus">
                <option>Chinquihue</option>
                <option>Osorno</option>
              </select>
            </div>
            <label for="grupocheck">Area de Interés</label>
            <div id="grupocheck">
              <div class="form-check form-check-inline" >
                <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio1" value="option1">
                <label class="form-check-label" for="inlineRadio1">Música</label>
              </div>
              <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio2" value="option2">
                <label class="form-check-label" for="inlineRadio2">Tecnología </label>
              </div>
            </div>
            <div class="form-group">
              <label for="cajatexto">Mas informacion</label>
              <textarea class="form-control" id="cajatexto" rows="3" placeholder="Cuentanos mas sobre tus intereses"></textarea>
            </div>
            <button type="reset" class="btn btn-secondary">Limpiar</button><br><br>
            <button type="submit" class="btn btn-primary" onclick="">Enviar</button>
          </form>

          <!---->

        </div>
      </div>  
    </div>
    <script>
      const form = document.querySelector('form');
      form.addEventListener('submit', function(event) {
        event.preventDefault(); // Evita que el formulario se envíe de forma tradicional

        // Aquí puedes agregar la lógica para procesar los datos del formulario
        const nombre = document.getElementById('nombre').value;
        const apellido = document.getElementById('apellido').value;
        const correo = document.getElementById('email').value;
        const telefono = document.getElementById('telefono').value;
        const campus = document.getElementById('campus').value;
        const areaInteres = document.querySelector('input[name="inlineRadioOptions"]:checked').value;
        const comentario = document.getElementById('cajatexto').value;

        // Puedes enviar estos datos a un servidor o procesarlos como desees
        console.log('Nombre:', nombre);
        console.log('Apellido:', apellido);
        console.log('Correo:', correo);
        console.log('Teléfono:', telefono);
        console.log('Campus:', campus);
        console.log('Área de Interés:', areaInteres);
        console.log('Comentario:', comentario);

        // Opcionalmente, puedes mostrar un mensaje de éxito o limpiar el formulario
        alert('Formulario enviado con éxito');
        form.reset();
      });
    </script>
